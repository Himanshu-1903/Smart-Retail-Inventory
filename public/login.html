<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Sign in to Smart Retail Inventory Management System" />
    <title>Sign In | Smart Retail Inventory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/forms.css" />
  </head>
  <body>
    <div class="auth-page">
      <div class="auth-card">
        <div class="auth-header">
          <div class="auth-logo">
            <svg width="44" height="44" viewBox="0 0 48 48" fill="none">
              <rect width="48" height="48" rx="14" fill="url(#g1)" />
              <path
                d="M14 24L22 32L34 16"
                stroke="white"
                stroke-width="3"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <defs>
                <linearGradient id="g1" x1="0" y1="0" x2="48" y2="48">
                  <stop stop-color="#6366f1" />
                  <stop offset="1" stop-color="#8b5cf6" />
                </linearGradient>
              </defs>
            </svg>
            <span class="auth-logo-text">SmartRetail</span>
          </div>
          <h2>Welcome back</h2>
          <p>Sign in to your dashboard</p>
        </div>

        <div class="auth-alert" id="login-alert"></div>

        <form class="auth-form" id="login-form" autocomplete="on">
          <div class="form-group">
            <label for="login-email">Email Address</label>
            <input type="email" id="login-email" placeholder="admin@smartretail.com" required autocomplete="email" />
          </div>

          <div class="form-group">
            <label for="login-password">Password</label>
            <div class="password-field">
              <input
                type="password"
                id="login-password"
                placeholder="Enter your password"
                required
                autocomplete="current-password"
              />
              <button
                type="button"
                class="password-toggle"
                id="toggle-password-btn"
                aria-label="Toggle password visibility"
              >
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
          </div>

          <button type="submit" class="auth-btn" id="login-btn">
            <span class="btn-text">Sign In</span>
          </button>
        </form>

        <div class="auth-footer">Don't have an account? <a href="/register.html">Create one</a></div>
      </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
  </body>
</html>
